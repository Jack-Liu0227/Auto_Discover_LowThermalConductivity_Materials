# LLM 输入/输出配置文件
# 用于保存所有 LLM 调用的输入和输出，确保透明性和可追溯性

## 1. 材料评估 LLM 输入/输出
evaluation:
  # LLM 输入文件路径（包含：理论文档 + 候选材料信息 + 评估要求）
  input:
    dir: "results/round_{round}/reports"
    filename: "llm_evaluation_input.md"
    # 完整路径示例: results/round_1/reports/llm_evaluation_input.md
  
  # LLM 输出文件路径（包含：AI 评估结果的 JSON）
  output:
    dir: "results/round_{round}/reports"
    filename: "llm_evaluation_output.md"
    # 完整路径示例: results/round_1/reports/llm_evaluation_output.md
  
  # AI 筛选结果（CSV 格式）
  selected_csv:
    dir: "results/round_{round}/selected_results"
    filename: "ai_selected_materials.csv"

## 2. 理论文档更新 LLM 输入/输出
theory_update:
  # LLM 输入文件路径（包含：原始文档 + 成功案例 + 更新要求）
  input:
    dir: "results/round_{round}/reports"
    filename: "llm_theory_update_input.md"
    # 完整路径示例: results/round_1/reports/llm_theory_update_input.md
  
  # LLM 输出文件路径（包含：更新后的完整文档）
  output:
    dir: "results/round_{round}/reports"
    filename: "llm_theory_update_output.md"
    # 完整路径示例: results/round_1/reports/llm_theory_update_output.md
  
  # 更新后的理论文档保存位置
  updated_doc:
    dir: "llm/doc/v0.0.{version}"
    filename: "Theoretical_principle_document.md"
    # 完整路径示例: llm/doc/v0.0.2/Theoretical_principle_document.md

## 3. 文档路径
documents:
  # 初始理论文档
  initial_theory_doc: "llm/doc/v0.0.1/Theoretical_principle_document.md"
  
  # 版本化理论文档模板
  versioned_theory_doc: "llm/doc/v0.0.{version}/Theoretical_principle_document.md"

## 4. 成功案例文件
success:
  # 成功材料 CSV 文件路径
  csv_dir: "results/round_{round}/success_examples"
  csv_filename: "success_materials.csv"
  # 完整路径示例: results/round_1/success_examples/success_materials.csv

## 5. AI 模型配置
ai:
  # 默认模型
  default_model: "deepseek-chat"
  
  # 模型列表（使用 LiteLLM 统一调用）
  models:
    # DeepSeek Chat - 默认模型
    - id: "deepseek-chat"
      name: "DeepSeek Chat"
      description: "DeepSeek 对话模型（默认）"
      model: "deepseek/deepseek-chat"  # LiteLLM 格式
      api_key: "${DEEPSEEK_API_KEY}"   # 从环境变量读取
      base_url: "https://api.deepseek.com/v1"  # 可选，DeepSeek API 地址
      default_temperature: 0.3
      max_tokens: 4000
    
    # Gemini 2.5 Flash
    - id: "gemini-2.5-flash"
      name: "Gemini 2.5 Flash"
      description: "Google Gemini 2.5 Flash 模型"
      model: "gemini/gemini-2.0-flash-exp"  # LiteLLM 格式
      api_key: "${GEMINI_API_KEY}"
      base_url: null  # Google Gemini 使用默认地址
      default_temperature: 0.3
      max_tokens: 4000
    
    # GPT-4 Turbo
    - id: "gpt-4-turbo"
      name: "GPT-4 Turbo"
      description: "OpenAI GPT-4 Turbo 模型"
      model: "gpt-4-turbo-preview"  # LiteLLM 格式
      api_key: "${OPENAI_API_KEY}"
      base_url: "${OPENAI_BASE_URL}"  # 可选，支持自定义 base_url
      default_temperature: 0.3
      max_tokens: 4000
    
    # Claude 3 Sonnet
    - id: "claude-3-sonnet"
      name: "Claude 3 Sonnet"
      description: "Anthropic Claude 3 Sonnet 模型"
      model: "claude-3-sonnet-20240229"  # LiteLLM 格式
      api_key: "${ANTHROPIC_API_KEY}"
      base_url: null  # Claude 使用默认地址
      default_temperature: 0.3
      max_tokens: 4000
  
  # 备选模型（旧格式，保留兼容性）
  alternative_models:
    - "gemini-2.5-flash"
    - "gpt-4-turbo"
    - "claude-3-sonnet"
  
  # 温度参数（控制输出的随机性，0=确定性，1=随机性）
  temperature:
    evaluation: 0.3      # 材料评估：较低温度，更准确
    theory_update: 0.3   # 理论更新：较低温度，更准确
  
  # Token 限制
  max_tokens:
    evaluation: 4000     # 材料评估输出
    theory_update: 8000  # 理论文档更新输出

## 6. 评估参数
evaluation_params:
  n_select: 5           # 每轮筛选的材料数量
  n_candidates: 20      # TOP N 候选材料数量

## 7. 迭代配置
iteration:
  max_rounds: 10                    # 最大迭代轮次
  convergence_threshold: 0.95       # 收敛阈值（成功率）
  
## 8. 文件命名约定
naming:
  # 使用时间戳后缀
  use_timestamp: true
  timestamp_format: "%Y%m%d_%H%M%S"
  
  # 示例文件名：
  # - llm_evaluation_input_20251222_233010.md
  # - llm_evaluation_output_20251222_233010.md

### 迭代配置
iteration:
  max_rounds: 10  # 最大迭代轮次
  convergence_threshold: 0.95  # 收敛阈值（成功率）
